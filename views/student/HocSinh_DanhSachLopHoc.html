<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học sinh – Danh sách lớp học</title>
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <div class="layout">
      <div id="app-sidebar"></div>
      <main class="main-content">
        <div class="role-title-box"><h2>VAI TRÒ HỌC SINH</h2></div>
        <div class="content-box">
          <div class="section-title blue">Danh sách lớp học</div>
          <div class="action-bar">
            <button class="action-btn" onclick="location.reload()">
              Làm mới
            </button>
            <button class="action-btn" onclick="alert('Lọc lớp học!')">
              Lọc
            </button>
          </div>
          <div class="table-wrap">
            <table class="tbl">
              <thead>
                <tr>
                  <th>Tên lớp học</th>
                  <th>Khối lớp</th>
                  <th>Môn học</th>
                  <th>Giáo viên</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Lớp Toán học 11</td>
                  <td>Khối 11</td>
                  <td>Toán học</td>
                  <td>Giang Thùy Hằng</td>
                  <td>
                    <a
                      class="tbl-link"
                      onclick="alert('Xem lịch học Lớp Toán học 11!')"
                      >Xem lịch học</a
                    >
                  </td>
                </tr>
                <tr>
                  <td>Lớp Hóa học 11</td>
                  <td>Khối 11</td>
                  <td>Hóa học</td>
                  <td>Giang Thùy Vân</td>
                  <td>
                    <a
                      class="tbl-link"
                      onclick="alert('Xem lịch học Lớp Hóa học 11!')"
                      >Xem lịch học</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script>
      window.PAGE_ROLE = "hocsinh";
      window.PAGE_ACTIVE = "hs-ds-lophoc";
    </script>
    <script src="/PHP_FinalExam/assets/js/layout.js"></script>
  </body>
</html>
