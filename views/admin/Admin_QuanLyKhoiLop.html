<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Quản lý khối lớp</title>
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <div class="layout">
      <div id="app-sidebar"></div>
      <main class="main-content">
        <div class="role-title-box"><h2>VAI TRÒ ADMIN</h2></div>
        <div class="content-box">
          <div class="section-title">Quản lý khối lớp</div>
          <div class="action-bar">
            <button class="action-btn" onclick="alert('Thêm khối lớp mới!')">
              + Thêm mới
            </button>
            <button class="action-btn" onclick="location.reload()">
              Làm mới
            </button>
          </div>
          <div class="table-wrap">
            <table class="tbl">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Tên khối</th>
                  <th>Số lớp học</th>
                  <th>Số môn học</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Khối 10</td>
                  <td>5</td>
                  <td>8</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa Khối 10!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Khối 10')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Khối 11</td>
                  <td>6</td>
                  <td>8</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa Khối 11!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Khối 11')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Khối 12</td>
                  <td>6</td>
                  <td>8</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa Khối 12!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Khối 12')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script>
      window.PAGE_ROLE = "admin";
      window.PAGE_ACTIVE = "quanly-khoilop";
      function confirmDelete(name) {
        if (confirm("Bạn có chắc muốn xóa " + name + "?"))
          alert("Đã xóa " + name + "!");
      }
    </script>
    <script src="/PHP_FinalExam/assets/js/layout.js"></script>
  </body>
</html>
