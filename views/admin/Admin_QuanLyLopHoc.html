<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Quản lý lớp học</title>
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <div class="layout">
      <div id="app-sidebar"></div>
      <main class="main-content">
        <div class="role-title-box"><h2>VAI TRÒ ADMIN</h2></div>
        <div class="content-box">
          <div class="section-title">Quản lý lớp học</div>
          <div class="action-bar">
            <button class="action-btn" onclick="alert('Thêm lớp học mới!')">
              + Thêm mới
            </button>
            <button class="action-btn" onclick="alert('Lọc theo khối!')">
              Lọc
            </button>
            <button class="action-btn" onclick="location.reload()">
              Làm mới
            </button>
          </div>
          <div class="table-wrap">
            <table class="tbl">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Tên lớp học</th>
                  <th>Khối lớp</th>
                  <th>Môn học</th>
                  <th>Giáo viên phụ trách</th>
                  <th>Số học sinh</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Lớp Toán học 11</td>
                  <td>Khối 11</td>
                  <td>Toán học</td>
                  <td>Giang Thùy Hằng</td>
                  <td>32</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa lớp!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Lớp Toán học 11')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Lớp Hóa học 11</td>
                  <td>Khối 11</td>
                  <td>Hóa học</td>
                  <td>Giang Thùy Vân</td>
                  <td>30</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa lớp!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Lớp Hóa học 11')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Lớp Toán học 12</td>
                  <td>Khối 12</td>
                  <td>Toán học</td>
                  <td>Đặng Thị Nga</td>
                  <td>35</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa lớp!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('Lớp Toán học 12')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script>
      window.PAGE_ROLE = "admin";
      window.PAGE_ACTIVE = "quanly-lophoc";
      function confirmDelete(name) {
        if (confirm("Bạn có chắc muốn xóa " + name + "?"))
          alert("Đã xóa " + name + "!");
      }
    </script>
    <script src="/PHP_FinalExam/assets/js/layout.js"></script>
  </body>
</html>
