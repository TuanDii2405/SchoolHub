<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giáo viên – Trắc nghiệm đúng sai</title>
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <div class="layout">
      <div id="app-sidebar"></div>
      <main class="main-content">
        <div class="role-title-box"><h2>VAI TRÒ GIÁO VIÊN</h2></div>
        <div class="content-box">
          <div class="section-title blue">
            Ngân hàng câu hỏi – Trắc nghiệm Đúng / Sai
          </div>
          <div class="action-bar">
            <button class="action-btn" onclick="alert('Thêm câu hỏi mới!')">
              + Thêm câu hỏi
            </button>
            <button class="action-btn" onclick="alert('Lọc theo chủ đề!')">
              Lọc
            </button>
            <button class="action-btn" onclick="location.reload()">
              Làm mới
            </button>
          </div>
          <div class="table-wrap">
            <table class="tbl">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Nội dung câu hỏi</th>
                  <th>Đáp án đúng</th>
                  <th>Chủ đề</th>
                  <th>Độ khó</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td style="text-align: left">
                    Phân tử H₂O có liên kết cộng hóa trị.
                  </td>
                  <td>Đúng</td>
                  <td>Hóa hữu cơ</td>
                  <td>Dễ</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('câu hỏi này')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td style="text-align: left">
                    Điện trở của dây dẫn không phụ thuộc vào nhiệt độ.
                  </td>
                  <td>Sai</td>
                  <td>Điện học</td>
                  <td>Trung bình</td>
                  <td>
                    <button class="btn-edit" onclick="alert('Sửa!')">
                      Sửa
                    </button>
                    <button
                      class="btn-danger"
                      onclick="confirmDelete('câu hỏi này')"
                    >
                      Xóa
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script>
      window.PAGE_ROLE = "giaovien";
      window.PAGE_ACTIVE = "tnds";
      function confirmDelete(name) {
        if (confirm("Bạn có chắc muốn xóa " + name + "?")) alert("Đã xóa!");
      }
    </script>
    <script src="/PHP_FinalExam/assets/js/layout.js"></script>
  </body>
</html>
