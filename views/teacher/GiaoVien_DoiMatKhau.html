<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giáo viên – Đổi mật khẩu</title>
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
  </head>
  <body>
    <div id="app-header"></div>
    <div class="layout">
      <div id="app-sidebar"></div>
      <main class="main-content">
        <div class="role-title-box"><h2>VAI TRÒ GIÁO VIÊN</h2></div>
        <div class="content-box">
          <div class="section-title blue">Đổi mật khẩu</div>
          <form onsubmit="handleChange(event)" style="max-width: 440px">
            <div class="form-group-inline">
              <label>Mật khẩu hiện tại</label>
              <input
                type="password"
                id="old-pass"
                placeholder="Nhập mật khẩu hiện tại..."
                required
              />
            </div>
            <div class="form-group-inline">
              <label>Mật khẩu mới</label>
              <input
                type="password"
                id="new-pass"
                placeholder="Nhập mật khẩu mới..."
                required
              />
            </div>
            <div class="form-group-inline">
              <label>Xác nhận mật khẩu mới</label>
              <input
                type="password"
                id="confirm-pass"
                placeholder="Nhập lại mật khẩu mới..."
                required
              />
            </div>
            <button type="submit" class="btn-primary">
              Xác nhận đổi mật khẩu
            </button>
          </form>
        </div>
      </main>
    </div>
    <script>
      window.PAGE_ROLE = "giaovien";
      window.PAGE_ACTIVE = "gv-doimatkhau";
      function handleChange(e) {
        e.preventDefault();
        var o = document.getElementById("old-pass").value;
        var n = document.getElementById("new-pass").value;
        var c = document.getElementById("confirm-pass").value;
        if (!o || !n || !c) {
          alert("Vui lòng nhập đầy đủ!");
          return;
        }
        if (n.length < 6) {
          alert("Mật khẩu mới phải có ít nhất 6 ký tự!");
          return;
        }
        if (n !== c) {
          alert("Mật khẩu xác nhận không khớp!");
          return;
        }
        if (o === n) {
          alert("Mật khẩu mới không được trùng mật khẩu cũ!");
          return;
        }
        alert("Đổi mật khẩu thành công!");
      }
    </script>
    <script src="/PHP_FinalExam/assets/js/layout.js"></script>
  </body>
</html>
