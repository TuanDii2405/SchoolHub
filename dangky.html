<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký – Hệ thống Quản lý Trường học</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/PHP_FinalExam/assets/css/style.css" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .auth-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 34px 14px;
      }
      .auth-card {
        position: relative;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        border: 1.5px solid #9fc0ea;
        padding: 34px 34px 26px;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 18px 40px rgba(18, 72, 116, 0.2);
        backdrop-filter: blur(2px);
      }
      .auth-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 5px;
        border-radius: 16px 16px 0 0;
        background: linear-gradient(90deg, #124874, #2f6897);
      }
      .auth-card h2 {
        font-size: 24px;
        font-weight: 700;
        color: #124874;
        margin-bottom: 8px;
        text-align: center;
        letter-spacing: 0.2px;
      }
      .auth-subtitle {
        text-align: center;
        color: #4e6b88;
        font-size: 13px;
        margin-bottom: 22px;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #1e4d94;
        margin-bottom: 5px;
      }
      .field-wrap {
        position: relative;
      }
      .field-wrap i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #5d82b8;
        font-size: 14px;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px 12px 10px 36px;
        border: 1.5px solid #7fa7de;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
        background: #f8fbff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input:focus,
      .form-group select:focus {
        border-color: #124874;
        box-shadow: 0 0 0 3px rgba(18, 72, 116, 0.14);
      }
      .btn-submit {
        width: 100%;
        padding: 11px;
        background: #124874;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .btn-submit:hover {
        background: #0d3657;
        transform: translateY(-1px);
      }
      .btn-submit i {
        margin-right: 6px;
      }
      .auth-links {
        margin-top: 18px;
        text-align: center;
        font-size: 13px;
        color: #4e6b88;
      }
      .auth-links a {
        display: inline-block;
        padding: 6px 18px;
        margin-left: 6px;
        background: #e6eef6;
        border: 1.5px solid #7fa7de;
        border-radius: 20px;
        color: #124874;
        text-decoration: none;
        cursor: pointer;
        font-size: 12.5px;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .auth-links a:hover {
        background: #d3e1f2;
        transform: translateY(-1px);
      }
      .auth-links i {
        margin-right: 5px;
      }
      .form-row {
        display: flex;
        gap: 12px;
      }
      .form-row .form-group {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <a
          href="https://i.ibb.co/s9YdMrTJ/Logo-HCMUE-Gia-tri-cot-loi-1-co-vien.png"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Logo HCMUE"
        >
          <img
            class="header-logo-img"
            src="https://i.ibb.co/s9YdMrTJ/Logo-HCMUE-Gia-tri-cot-loi-1-co-vien.png"
            alt="Logo Trường ĐHSP TP.HCM"
          />
        </a>
      </div>
    </header>

    <div class="auth-wrap">
      <div class="auth-card">
        <h2>ĐĂNG KÝ TÀI KHOẢN</h2>
        <p class="auth-subtitle">
          Tạo tài khoản mới để bắt đầu sử dụng hệ thống
        </p>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <div class="field-wrap">
              <i class="bi bi-person"></i>
              <input
                type="text"
                id="fullname"
                placeholder="Nhập họ và tên..."
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="dob">Ngày sinh</label>
              <div class="field-wrap">
                <i class="bi bi-calendar3"></i>
                <input type="date" id="dob" required />
              </div>
            </div>
            <div class="form-group">
              <label for="role">Vai trò</label>
              <div class="field-wrap">
                <i class="bi bi-person-badge"></i>
                <select id="role" required>
                  <option value="">-- Chọn vai trò --</option>
                  <option value="hocsinh">Học sinh</option>
                  <option value="giaovien">Giáo viên</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <div class="field-wrap">
              <i class="bi bi-at"></i>
              <input
                type="text"
                id="username"
                placeholder="Nhập tên đăng nhập..."
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <div class="field-wrap">
              <i class="bi bi-envelope"></i>
              <input
                type="email"
                id="email"
                placeholder="Nhập địa chỉ email..."
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="field-wrap">
              <i class="bi bi-key"></i>
              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu..."
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="repassword">Xác nhận mật khẩu</label>
            <div class="field-wrap">
              <i class="bi bi-shield-check"></i>
              <input
                type="password"
                id="repassword"
                placeholder="Nhập lại mật khẩu..."
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-submit">
            <i class="bi bi-person-plus"></i>Đăng ký
          </button>
        </form>

        <div class="auth-links">
          Đã có tài khoản?
          <a onclick="window.location.href = 'dangnhap.php'"
            ><i class="bi bi-box-arrow-in-right"></i>Đăng nhập ngay</a
          >
        </div>
      </div>
    </div>

    <script>
      function handleRegister(e) {
        e.preventDefault();
        var fullname = document.getElementById("fullname").value.trim();
        var dob = document.getElementById("dob").value;
        var role = document.getElementById("role").value;
        var username = document.getElementById("username").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        var repassword = document.getElementById("repassword").value;

        if (
          !fullname ||
          !dob ||
          !role ||
          !username ||
          !email ||
          !password ||
          !repassword
        ) {
          alert("Vui lòng nhập đầy đủ thông tin!");
          return;
        }

        if (password !== repassword) {
          alert("Mật khẩu xác nhận không khớp!");
          return;
        }

        if (password.length < 6) {
          alert("Mật khẩu phải có ít nhất 6 ký tự!");
          return;
        }

        alert("Đăng ký tài khoản thành công!\nChào mừng " + fullname + "!");
        window.location.href = "dangnhap.php";
      }
    </script>
  </body>
</html>
